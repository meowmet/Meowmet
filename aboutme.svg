<svg width="800" height="330" viewBox="0 0 800 330" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ── ANIMATIONS ────────────────────────────────────────────── -->

    <!-- Cursor blink -->
    <style>
      /* ── Reset: all text uses monospace ── */
      text, tspan {
        font-family: monospace;
      }

      /* ── Colour helpers ── */
      .c-green   { fill: #7ee787; }
      .c-blue    { fill: #58a6ff; }
      .c-muted   { fill: #8b949e; }
      .c-light   { fill: #cdd9e5; }
      .c-orange  { fill: #ffa657; }
      .c-yellow  { fill: #e3b341; }
      .c-dim     { fill: #484f58; }
      .c-status  { fill: #3fb950; }

      /* ── Font-size helpers ── */
      .fs-10 { font-size: 10px; }
      .fs-11 { font-size: 11px; }
      .fs-12 { font-size: 12px; }
      .fs-13 { font-size: 13px; }

      /* ── Font-weight ── */
      .fw-700 { font-weight: 700; }

      /* ── text-anchor ── */
      .ta-mid { text-anchor: middle; }

      /* ══════════════════════════════════════════
         1.  CURSOR BLINK
         ══════════════════════════════════════════ */
      .cursor-blink {
        animation: blink 1s step-start infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* ══════════════════════════════════════════
         2.  TYPING EFFECT  (clip-path reveal)
             Each prompt line is clipped from
             width=0 → width=full over N seconds.
         ══════════════════════════════════════════ */

      /* Line 1: "root@meowmet:~#  whoami …"  (y=68) */
      .type-l1 { animation: reveal-l1 1.2s steps(30,end) 0.3s both; }
      @keyframes reveal-l1 {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0%   0 0); }
      }

      /* Line 2: name + university  (stagger after l1) */
      .type-l2 { animation: reveal-l2 0.9s steps(25,end) 1.6s both; }
      @keyframes reveal-l2 {
        from { opacity: 0; clip-path: inset(0 100% 0 0); }
        to   { opacity: 1; clip-path: inset(0 0%   0 0); }
      }
      .type-l2b { animation: reveal-l2 0.7s steps(20,end) 2.0s both; }

      /* Line 3: "root@meowmet:~#  system-info …"  (y=148) */
      .type-l3 { animation: reveal-l3 1.2s steps(30,end) 2.6s both; }
      @keyframes reveal-l3 {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0%   0 0); }
      }

      /* Lines 4-9: language rows */
      .type-l4 { animation: reveal-fade 0.6s ease 3.9s both; }
      .type-l5 { animation: reveal-fade 0.6s ease 4.3s both; }
      .type-l6 { animation: reveal-fade 0.6s ease 4.7s both; }
      .type-l7 { animation: reveal-fade 0.6s ease 5.1s both; }
      .type-l8 { animation: reveal-fade 0.6s ease 5.5s both; }
      .type-l9 { animation: reveal-fade 0.5s ease 5.9s both; }

      /* Last prompt line (y=275) */
      .type-l10 { animation: reveal-fade 0.5s ease 6.3s both; }

      @keyframes reveal-fade {
        from { opacity: 0; transform: translateX(-4px); }
        to   { opacity: 1; transform: translateX(0);    }
      }

      /* ══════════════════════════════════════════
         3.  NEON GLOW  (right column headers)
         ══════════════════════════════════════════ */
      .neon-glow {
        animation: neon-pulse 3s ease-in-out infinite;
      }
      @keyframes neon-pulse {
        0%, 100% { filter: drop-shadow(0 0 0px #58a6ff00); opacity: 1;   }
        50%       { filter: drop-shadow(0 0 6px #58a6ff99); opacity: 0.85; }
      }

      .neon-glow-green {
        animation: neon-pulse-green 3s ease-in-out 1.5s infinite;
      }
      @keyframes neon-pulse-green {
        0%, 100% { filter: drop-shadow(0 0 0px #7ee78700); opacity: 1;   }
        50%       { filter: drop-shadow(0 0 6px #7ee78799); opacity: 0.85; }
      }

      /* Badge cards subtle glow */
      .badge-card {
        animation: badge-glow 4s ease-in-out infinite;
      }
      @keyframes badge-glow {
        0%, 100% { filter: drop-shadow(0 0 0px #30363d); }
        50%       { filter: drop-shadow(0 0 5px #58a6ff44); }
      }
    </style>

  </defs>

  <!-- ── Background ── -->
  <rect width="800" height="320" rx="10" fill="#0d1117"/>

  <!-- ── Top bar ── -->
  <rect width="800" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="800" height="10" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="22" class="c-muted fs-12 ta-mid">terminal — meowmet@dev</text>

  <!-- ── Divider ── -->
  <line x1="480" y1="50" x2="480" y2="300" stroke="#21262d" stroke-width="1"/>

  <!-- ════════════════════════════════════════
       LEFT COLUMN
       ════════════════════════════════════════ -->

  <!-- Prompt line 1 -->
  <text x="20" y="68" class="c-green fs-12 fw-700 type-l1">
    <tspan class="c-green fw-700">root@meowmet:~#</tspan>
    <tspan class="c-light fw-700"> whoami --full-profile</tspan>
  </text>

  <!-- Name -->
  <text x="20" y="90"  class="c-blue  fs-13 fw-700 type-l2">▶  Mehmet Nuri Erkan</text>
  <!-- University -->
  <text x="20" y="108" class="c-muted fs-11 type-l2b">   Computer Engineering </text>

  <!-- Prompt line 2 -->
  <text x="20" y="148" class="c-green fs-12 fw-700 type-l3">
    <tspan class="c-green fw-700">root@meowmet:~#</tspan>
    <tspan class="c-light fw-700"> system-info --languages</tspan>
  </text>

  <!-- Language rows -->
  <text x="20" y="168" class="fs-11 type-l4">
    <tspan class="c-yellow">01</tspan>
    <tspan class="c-muted">  Turkish       </tspan>
    <tspan class="c-green">████████████  </tspan>
    <tspan class="c-light">Native</tspan>
  </text>

  <text x="20" y="185" class="fs-11 type-l5">
    <tspan class="c-yellow">02</tspan>
    <tspan class="c-muted">  Indonesian    </tspan>
    <tspan class="c-green">██████████    </tspan>
    <tspan class="c-light">Fluent</tspan>
  </text>

  <text x="20" y="202" class="fs-11 type-l6">
    <tspan class="c-yellow">03</tspan>
    <tspan class="c-muted">  English       </tspan>
    <tspan class="c-status">████████      </tspan>
    <tspan class="c-light">B2-C1</tspan>
  </text>

  <text x="20" y="219" class="fs-11 type-l7">
    <tspan class="c-yellow">04</tspan>
    <tspan class="c-muted">  Arabic        </tspan>
    <tspan class="c-dim">█████          </tspan>
    <tspan class="c-muted">A2</tspan>
  </text>

  <text x="20" y="236" class="fs-11 type-l8">
    <tspan class="c-yellow">05</tspan>
    <tspan class="c-muted">  Russian       </tspan>
    <tspan class="c-dim">███           </tspan>
    <tspan class="c-muted">A1</tspan>
  </text>

  <!-- Bahasakedi note -->
  <text x="20" y="255" class="c-dim fs-10 type-l9">   └─ Founder of Bahasakedi (TR/ID Platform)</text>

  <!-- Final prompt + blinking cursor -->
  <text x="20" y="275" class="c-green fs-12 fw-700 type-l10">root@meowmet:~# <tspan class="c-light cursor-blink">█</tspan></text>

  <!-- ════════════════════════════════════════
       RIGHT COLUMN — Metrics
       ════════════════════════════════════════ -->

  <!-- GLOBAL METRICS header -->
  <text x="496" y="65" class="c-muted fs-11 neon-glow">┌─ GLOBAL METRICS ──────────────────┐</text>

  <!-- THM Badge -->
  <rect x="496" y="74" width="288" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" class="badge-card"/>
  <text x="506" y="92"  class="c-blue  fs-11 fw-700">TryHackMe</text>
  <rect x="628" y="79" width="66" height="18" rx="4" fill="#1f3a5f"/>
  <text x="661" y="92"  class="c-blue  fs-11 fw-700 ta-mid">Top 6%</text>
  <text x="506" y="112" class="c-muted fs-10">Offensive Security Researcher</text>

  <!-- Kaggle Badge -->
  <rect x="496" y="130" width="288" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" class="badge-card"/>
  <text x="506" y="148" class="c-blue  fs-11 fw-700">Kaggle</text>
  <text x="506" y="165" class="c-muted fs-10">ING — NLP Competition</text>
  <rect x="628" y="135" width="66" height="18" rx="4" fill="#1a3a2a"/>
  <text x="661" y="148" class="c-green fs-11 fw-700 ta-mid">Top 7%</text>
  <text x="506" y="180" class="c-muted fs-10">NLP Challenge</text>
  <rect x="628" y="168" width="66" height="18" rx="4" fill="#1a3a2a"/>
  <text x="661" y="181" class="c-green fs-11 fw-700 ta-mid">Top 25%</text>

  <!-- STATUS header -->
  <text x="496" y="210" class="c-muted fs-11 neon-glow-green">├─ STATUS ──────────────────────────┤</text>

  <text x="506" y="228" class="c-green  fs-10">● Active    Computer Engineering Student @ TR</text>
  <text x="506" y="244" class="c-yellow fs-10">◉ Building    Rainsense AI (AgriTech)</text>
  <text x="506" y="260" class="c-blue   fs-10">◈ Research Medical Informatics (Tanımatik) </text>

  <text x="496" y="278" class="c-muted fs-11 neon-glow">└───────────────────────────────────┘</text>

  <rect x="0" y="308" width="800" height="22" fill="#161b22"/>
  
  <rect x="0" y="308" width="800" height="2"  fill="#0d1117"/>
  
  <text x="16"  y="323" class="c-status fs-10">● ONLINE</text>
  <text x="120" y="323" class="c-muted  fs-10">meowmet · Computer Engineering · TR</text>
  <text x="700" y="323" class="c-muted  fs-10">UTF-8</text>

</svg>
